[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm prisma:generate && pnpm build:api"

[deploy]
startCommand = "pnpm --filter @integra/api prisma:migrate:deploy && pnpm --filter @integra/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
